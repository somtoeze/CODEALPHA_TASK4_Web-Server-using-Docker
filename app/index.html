<!DOCTYPE html><!DOCTYPE html>
<html>
<head>
    <title>CodeAlpha Task 4 - Web Server</title>
    <style>
        /* ── Reset & Fullscreen ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* ── Container ── */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            padding: 60px 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        /* ── Badge ── */
        .badge {
            background: #e94560;
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
            margin-bottom: 20px;
        }

        /* ── Headings ── */
        h1 {
            font-size: 4rem;
            font-weight: 900;
            color: #e94560;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        /* ── Info ── */
        .info {
            margin: 25px 0;
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 2.2;
        }

        .info strong {
            color: #e94560;
            font-weight: 800;
        }

        #hostname {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 16px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: #ffd700;
        }

        /* ── Footer ── */
        .footer-text {
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .footer-text span {
            color: #e94560;
            font-weight: 800;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .container {
                padding: 30px 20px;
            }
            .subtitle {
                font-size: 1.1rem;
            }
            .info {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge"> Web Server using Docker</div>
        <h1>CodeAlpha Task 4</h1>
        <p class="subtitle">Web Server running inside a Docker container</p>

        <div class="info">
            <p><strong>Container Hostname:</strong> Global</span></p>
            <p><strong>Deployed by:</strong> Eze Somtochukwu</p>
        </div>

        <div class="footer-text">
             Containerized web server with <span>health monitoring</span>
        </div>
    </div>

    <script>
        fetch('/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('hostname').textContent = data.hostname;
            })
            .catch(() => {
                document.getElementById('hostname').textContent = 'unknown';
            });
    </script>

</body>
</html>
